<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Express</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🍔 Food Express</h1>
    <p>Welcome to our restaurant</p>
</header>

<section class="menu">
    <h2>🍽 Our Menu</h2>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500" alt="Pizza">
        <h3>🍕 Pizza Margherita</h3>
        <p>Tomato, mozzarella, basil.</p>
        <span class="price">$10.99</span><br><br>
        <button onclick="order('Pizza Margherita')">Commander</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500" alt="Burger">
        <h3>🍔 Classic Burger</h3>
        <p>Beef, cheese, lettuce, tomato.</p>
        <span class="price">$8.99</span><br><br>
        <button onclick="order('Classic Burger')">Commander</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1613514785940-daed07799d9b?w=500" alt="Tacos">
        <h3>🌮 Chicken Tacos</h3>
        <p>Grilled chicken, vegetables, spicy sauce.</p>
        <span class="price">$7.99</span><br><br>
        <button onclick="order('Chicken Tacos')">Commander</button>
    </div>

</section>

<script src="script.js"></script>

</body>
</html>
